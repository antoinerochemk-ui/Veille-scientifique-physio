# ============================================================
# Règles de décision
# Cohérent avec le nouveau veille.py :
# Haute priorité = score élevé + signal stratégique
# + voie spécifique rachis stratégique si score >= 32
# ============================================================

decision_rules:
  high_priority_threshold: 40
  watch_threshold: 20
  peripheral_threshold: 10

